name: CD Pipeline

on:
  workflow_run:
    workflows: [CI Pipeline]
    types: [completed]
    branches: [main]

env:
  NODE_VERSION: '20'
  AWS_REGION: af-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.af-south-1.amazonaws.com
  ECR_REPOSITORY: cashtrace
  ECS_CLUSTER: cashtrace-staging
  ECS_SERVICE: cashtrace-api-staging

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 20
    environment:
      name: staging
      url: https://staging.cashtrace.ng
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull Docker image from ECR
        run: docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.event.workflow_run.head_sha }}

      - name: Deploy to ECS staging
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: task-definition-staging.json
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

      - name: Verify deployment health
        run: |
          MAX_RETRIES=10
          RETRY_INTERVAL=15
          HEALTH_URL="https://staging.cashtrace.ng/api/health"

          for i in $(seq 1 $MAX_RETRIES); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i/$MAX_RETRIES)"
              exit 0
            fi
            echo "Health check failed with status $STATUS (attempt $i/$MAX_RETRIES)"
            sleep $RETRY_INTERVAL
          done

          echo "Health check failed after $MAX_RETRIES attempts"
          exit 1

  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    timeout-minutes: 15
    env:
      STAGING_URL: https://staging.cashtrace.ng
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Run integration tests against staging
        run: npx vitest run --reporter=verbose 'src/**/*.integration.test.ts'
        env:
          STAGING_URL: ${{ env.STAGING_URL }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: integration-tests
    timeout-minutes: 30
    environment:
      name: production
      url: https://app.cashtrace.ng
    env:
      ECS_CLUSTER_PROD: cashtrace-production
      ECS_SERVICE_PROD: cashtrace-api-production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull Docker image from ECR
        run: docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.event.workflow_run.head_sha }}

      - name: Deploy to ECS production
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: task-definition-production.json
          service: ${{ env.ECS_SERVICE_PROD }}
          cluster: ${{ env.ECS_CLUSTER_PROD }}
          wait-for-service-stability: true
          wait-for-minutes: 15

      - name: Verify deployment health
        run: |
          MAX_RETRIES=12
          RETRY_INTERVAL=15
          HEALTH_URL="https://app.cashtrace.ng/api/health"

          for i in $(seq 1 $MAX_RETRIES); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Production health check passed (attempt $i/$MAX_RETRIES)"
              exit 0
            fi
            echo "Health check failed with status $STATUS (attempt $i/$MAX_RETRIES)"
            sleep $RETRY_INTERVAL
          done

          echo "Production health check failed after $MAX_RETRIES attempts"
          exit 1

      - name: Generate semantic version tag
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          MAJOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "Generated version tag: $NEW_TAG"

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Tag Docker image with version
        run: |
          COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"
          VERSION_TAG="${{ steps.version.outputs.tag }}"
          docker tag "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${COMMIT_SHA}" \
            "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${VERSION_TAG}"
          docker tag "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${COMMIT_SHA}" \
            "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest"
          docker push "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${VERSION_TAG}"
          docker push "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest"

  notify:
    name: Slack Notification
    runs-on: ubuntu-latest
    if: always()
    needs: [deploy-staging, integration-tests, deploy-production]
    steps:
      - name: Notify Slack on production success
        if: needs.deploy-production.result == 'success'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "✅ CashTrace deployed to production",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Production Deployment Succeeded*\n*Commit:* `${{ github.event.workflow_run.head_sha }}`\n*Triggered by:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on staging success (prod skipped/failed)
        if: needs.deploy-staging.result == 'success' && needs.deploy-production.result != 'success'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "🟡 CashTrace deployed to staging, production pending",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🟡 *Staging Deployment Succeeded*\nProduction deployment: ${{ needs.deploy-production.result }}\n*Commit:* `${{ github.event.workflow_run.head_sha }}`"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on failure
        if: needs.deploy-staging.result == 'failure' || needs.integration-tests.result == 'failure' || needs.deploy-production.result == 'failure'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "❌ CashTrace deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Deployment Failed*\n*Staging:* ${{ needs.deploy-staging.result }}\n*Integration Tests:* ${{ needs.integration-tests.result }}\n*Production:* ${{ needs.deploy-production.result }}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
