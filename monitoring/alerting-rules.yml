# ─── CashTrace — Alerting Rules ───────────────────────────────────────────────

groups:
  - name: cashtrace-alerts
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: High error rate detected
          description: >-
            Error rate is above 5% for the last 5 minutes.

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: High request latency
          description: >-
            95th percentile latency is above 2 seconds.

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / 1024 / 1024 > 512
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: High memory usage
          description: >-
            Process memory usage is above 512MB.
