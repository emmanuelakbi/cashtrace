services:
  postgres:
    image: postgres:16-alpine
    container_name: cashtrace-pg
    environment:
      POSTGRES_USER: cashtrace
      POSTGRES_PASSWORD: cashtrace
      POSTGRES_DB: cashtrace
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cashtrace']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cashtrace-redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
